<!DOCTYPE html>
<html>
<head>
<title>Maze Solver</title>
<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<h1 class="display-5">Maze Solver</h1>
<h2 class="display-6 text-center">Using BFS Algorithm</h2><div class="controls d-flex gap-2 justify-content-center">

<button class="btn btn-success" onclick="setMode('start')">Set Start</button>

<button class="btn btn-danger" onclick="setMode('end')">Set End</button>

<button class="btn btn-dark" onclick="setMode('wall')">Add Walls</button>

<button class="btn btn-secondary" onclick="clearGrid()">Clear</button>

<button class="btn btn-primary" onclick="solveMaze()">Solve</button>

</div>

<div id="grid"></div>

<script src="script.js"></script>

</body>
</html>
